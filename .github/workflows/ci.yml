name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - name: Test (per-file to avoid mock.module pollution)
        run: |
          set -eo pipefail
          failed=0
          while IFS= read -r f; do
            echo "::group::$f"
            if ! bun test "$f"; then
              failed=1
            fi
            echo "::endgroup::"
          done < <(find packages -type f -name '*.test.ts')
          exit $failed
