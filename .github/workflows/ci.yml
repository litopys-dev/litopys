name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun test
      - name: Graph integrity (litopys check)
        run: |
          mkdir -p /tmp/litopys-ci-graph
          LITOPYS_GRAPH_PATH=/tmp/litopys-ci-graph \
            bun packages/cli/src/index.ts check --json
