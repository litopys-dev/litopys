name: Deploy landing

on:
  push:
    branches: [main]
    paths:
      - "landing/**"
      - "docs/screenshots/**"
      - ".github/workflows/landing.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Sync screenshots into landing/public
        run: |
          mkdir -p landing/public/screenshots
          cp -f docs/screenshots/*.png landing/public/screenshots/
      - name: Install + build
        working-directory: landing
        run: |
          bun install --frozen-lockfile || bun install
          bun run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: landing/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
