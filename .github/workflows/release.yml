name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and attach binaries to (release will be created if missing)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            asset: litopys-linux-x64
          - target: bun-linux-arm64
            asset: litopys-linux-arm64
          - target: bun-darwin-x64
            asset: litopys-darwin-x64
          - target: bun-darwin-arm64
            asset: litopys-darwin-arm64
          - target: bun-windows-x64
            asset: litopys-windows-x64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Compile ${{ matrix.asset }}
        run: |
          mkdir -p dist
          bun build --compile --minify \
            --target=${{ matrix.target }} \
            --outfile=dist/${{ matrix.asset }} \
            packages/cli/src/index.ts
          ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          retention-days: 3

  release:
    name: Attach binaries to release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Generate SHASUMS256.txt
        working-directory: dist
        run: |
          # Sort the file list so the checksum file is byte-deterministic across re-runs.
          sha256sum $(ls litopys-* | sort) > SHASUMS256.txt
          cat SHASUMS256.txt

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          if ! gh release view "$tag" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            prerelease_flag=""
            case "$tag" in
              *-alpha*|*-beta*|*-rc*) prerelease_flag="--prerelease" ;;
            esac
            gh release create "$tag" \
              --repo "${{ github.repository }}" \
              --title "$tag" \
              --generate-notes \
              $prerelease_flag
          fi

      - name: Attach binaries to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.tag.outputs.tag }}" dist/* --clobber --repo ${{ github.repository }}
